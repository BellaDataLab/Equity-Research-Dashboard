<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美股分析儀表板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: rgba(255,255,255,0.07);
    --accent: #00e5a0;
    --accent2: #7b61ff;
    --red: #ff4d6a;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --mono: 'DM Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
  }

  /* ── Search ──────────────────────────────── */
  .hero {
    padding: 60px 40px 40px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .hero h1 {
    font-size: 13px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 16px;
    font-weight: 400;
  }

  .search-row {
    display: flex;
    gap: 12px;
    align-items: center;
    max-width: 520px;
  }

  .search-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 22px;
    padding: 14px 20px;
    border-radius: 8px;
    outline: none;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    transition: border-color 0.2s;
  }

  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); font-size: 16px; letter-spacing: 0.05em; }

  .search-btn {
    background: var(--accent);
    color: #000;
    border: none;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 14px 28px;
    border-radius: 8px;
    cursor: pointer;
    transition: opacity 0.2s;
    white-space: nowrap;
  }

  .search-btn:hover { opacity: 0.85; }

  .quick-btns {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    flex-wrap: wrap;
  }

  .quick-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .quick-btn:hover { color: var(--accent); border-color: var(--accent); }

  /* ── Loading / Error ─────────────────────── */
  #status {
    max-width: 1200px;
    margin: 20px auto;
    padding: 0 40px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--muted);
    min-height: 24px;
  }

  #status.error { color: var(--red); }

  /* ── Dashboard ───────────────────────────── */
  #dashboard {
    display: none;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 40px 80px;
  }

  /* ── Header strip ─────────────────────────── */
  .stock-header {
    display: flex;
    align-items: flex-end;
    gap: 32px;
    padding: 32px 0 28px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .stock-name h2 {
    font-size: 32px;
    font-weight: 800;
    line-height: 1;
  }

  .stock-name p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
    font-family: var(--mono);
  }

  .price-block { margin-left: auto; text-align: right; }

  .price-main {
    font-family: var(--mono);
    font-size: 42px;
    font-weight: 500;
    line-height: 1;
  }

  .price-change {
    font-family: var(--mono);
    font-size: 15px;
    margin-top: 6px;
  }

  .up { color: var(--accent); }
  .down { color: var(--red); }

  /* ── Grid ────────────────────────────────── */
  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-top: 16px;
  }

  .grid-3 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-top: 16px;
  }

  .grid-4 {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-top: 16px;
  }

  /* ── Cards ───────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 24px;
  }

  .card-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 400;
  }

  .card-value {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 500;
  }

  .card-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    font-family: var(--mono);
  }

  /* ── Section title ───────────────────────── */
  .section-title {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 36px 0 14px;
    font-weight: 400;
  }

  /* ── Chart ───────────────────────────────── */
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    margin-top: 16px;
  }

  .chart-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .chart-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.05em;
  }

  .chart-stat {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }

  .chart-wrap { position: relative; height: 280px; }

  /* ── Table ───────────────────────────────── */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-top: 16px;
  }

  table { width: 100%; border-collapse: collapse; }

  th {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 12px 20px;
    text-align: right;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    font-weight: 400;
  }

  th:first-child { text-align: left; }

  td {
    font-family: var(--mono);
    font-size: 13px;
    padding: 11px 20px;
    text-align: right;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }

  td:first-child {
    text-align: left;
    color: var(--muted);
    font-size: 12px;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }

  /* ── Description ─────────────────────────── */
  .desc-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 24px;
    margin-top: 16px;
    font-size: 13px;
    line-height: 1.75;
    color: var(--muted);
  }

  /* ── Analyst bar ─────────────────────────── */
  .analyst-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 24px;
  }

  .rec-badge {
    display: inline-block;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 4px;
    letter-spacing: 0.08em;
    margin-bottom: 12px;
  }

  .rec-buy    { background: rgba(0,229,160,0.15); color: var(--accent); }
  .rec-hold   { background: rgba(255,220,80,0.15); color: #ffdc50; }
  .rec-sell   { background: rgba(255,77,106,0.15); color: var(--red); }
  .rec-other  { background: rgba(123,97,255,0.15); color: var(--accent2); }

  .target-row {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
  }

  .target-row span:last-child { color: var(--text); }

  /* ── Analyst detail ──────────────────────── */
  .analyst-detail {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-top: 16px;
    overflow: hidden;
  }

  .analyst-summary {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
    gap: 0;
    border-bottom: 1px solid var(--border);
  }

  .consensus-block {
    padding: 20px 24px;
    border-right: 1px solid var(--border);
  }

  .consensus-block:last-child { border-right: none; }

  .bar-container {
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 6px;
  }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 11px;
  }

  .bar-label { color: var(--muted); width: 40px; flex-shrink: 0; }
  .bar-track { flex: 1; height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .bar-fill  { height: 100%; border-radius: 2px; }
  .bar-count { color: var(--muted); width: 20px; text-align: right; }

  .upgrades-table { width: 100%; border-collapse: collapse; }
  .upgrades-table th {
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); padding: 12px 20px; text-align: left;
    border-bottom: 1px solid var(--border); background: var(--surface2);
    font-weight: 400;
  }
  .upgrades-table td {
    font-size: 13px; padding: 11px 20px; text-align: left;
    border-bottom: 1px solid var(--border); color: var(--text);
    font-family: var(--mono);
  }
  .upgrades-table tr:last-child td { border-bottom: none; }
  .upgrades-table tr:hover td { background: var(--surface2); }

  .grade-up   { color: var(--accent); }
  .grade-down { color: var(--red); }
  .grade-init { color: var(--accent2); }
  .grade-neutral { color: var(--muted); }

  .action-badge {
    display: inline-block; font-size: 10px; padding: 2px 7px;
    border-radius: 3px; letter-spacing: 0.06em; font-weight: 500;
  }

  .load-analysts-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    margin-top: 10px;
    transition: all 0.15s;
  }
  .load-analysts-btn:hover { color: var(--accent); border-color: var(--accent); }

  @media (max-width: 768px) {
    .hero, #dashboard { padding-left: 20px; padding-right: 20px; }
    .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr 1fr; }
    .price-main { font-size: 30px; }
  }
</style>
</head>
<body>

<div class="hero">
  <h1>美股分析儀表板</h1>
  <div class="search-row">
    <input class="search-input" id="ticker-input" type="text" placeholder="輸入股票代碼" maxlength="10">
    <button class="search-btn" onclick="doSearch()">查詢</button>
  </div>
  <div class="quick-btns">
    <button class="quick-btn" onclick="quickSearch('AAPL')">AAPL</button>
    <button class="quick-btn" onclick="quickSearch('NVDA')">NVDA</button>
    <button class="quick-btn" onclick="quickSearch('MSFT')">MSFT</button>
    <button class="quick-btn" onclick="quickSearch('TSLA')">TSLA</button>
    <button class="quick-btn" onclick="quickSearch('META')">META</button>
    <button class="quick-btn" onclick="quickSearch('GOOGL')">GOOGL</button>
    <button class="quick-btn" onclick="quickSearch('AMZN')">AMZN</button>
  </div>
</div>

<div id="status"></div>
<div id="dashboard"></div>

<script>
const $ = id => document.getElementById(id);

document.getElementById('ticker-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

function quickSearch(t) {
  $('ticker-input').value = t;
  doSearch();
}

function fmtNum(n, prefix='', suffix='', dec=2) {
  if (n == null) return '—';
  const abs = Math.abs(n);
  if (abs >= 1e12) return `${prefix}${(n/1e12).toFixed(dec)}T${suffix}`;
  if (abs >= 1e9)  return `${prefix}${(n/1e9).toFixed(dec)}B${suffix}`;
  if (abs >= 1e6)  return `${prefix}${(n/1e6).toFixed(dec)}M${suffix}`;
  return `${prefix}${n.toLocaleString(undefined,{minimumFractionDigits:dec,maximumFractionDigits:dec})}${suffix}`;
}

function fmtPct(n, alreadyPct=true) {
  if (n == null) return '—';
  const cls = n >= 0 ? 'up' : 'down';
  const sign = n >= 0 ? '+' : '';
  return `<span class="${cls}">${sign}${n.toFixed(2)}%</span>`;
}

function recClass(rec) {
  if (!rec || rec === 'N/A') return 'rec-other';
  const r = rec.toUpperCase();
  if (r.includes('BUY') || r.includes('STRONG')) return 'rec-buy';
  if (r.includes('HOLD') || r.includes('NEUTRAL')) return 'rec-hold';
  if (r.includes('SELL') || r.includes('UNDER'))   return 'rec-sell';
  return 'rec-other';
}

let priceChart = null;

let analystChart = null;

async function loadAnalysts(ticker) {
  const container = $('analysts-detail');
  container.innerHTML = `<div style="padding:20px 24px;font-family:var(--mono);font-size:12px;color:var(--muted)">載入中...</div>`;

  try {
    const res  = await fetch(`/api/analysts/${ticker}`);
    const data = await res.json();
    if (data.error) { container.innerHTML = `<div style="padding:20px 24px;color:var(--red)">${data.error}</div>`; return; }

    const { rec_trend, price_target, latest_ratings } = data;

    // ── Action style helper ───────────────────────────────────────
    function actionStyle(action) {
      const a = (action||'').toLowerCase();
      if (a === 'up')   return ['grade-up',      '↑ 升評'];
      if (a === 'down') return ['grade-down',     '↓ 降評'];
      if (a === 'init') return ['grade-init',     '● 新評'];
      if (a === 'main') return ['grade-neutral',  '↺ 維持'];
      return ['grade-neutral', action||'—'];
    }

    function gradeClass(g) {
      const s = (g||'').toLowerCase();
      if (s.includes('buy') || s.includes('overweight') || s.includes('outperform')) return 'grade-up';
      if (s.includes('sell') || s.includes('underweight') || s.includes('underperform')) return 'grade-down';
      if (s.includes('hold') || s.includes('neutral') || s.includes('equal')) return 'grade-neutral';
      return '';
    }

    // ── 1. Recommendation bar chart ───────────────────────────────
    const BAR_H = 160;
    const recChartHtml = rec_trend.length ? `
      <div style="padding:24px">
        <div style="font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);margin-bottom:20px">分析師推薦分佈趨勢</div>
        <div style="display:flex;align-items:flex-end;gap:24px">
          ${rec_trend.map(m => {
            const total = (m.strongBuy||0)+(m.buy||0)+(m.hold||0)+(m.sell||0)+(m.strongSell||0);
            const hSB = total ? Math.round(m.strongBuy/total*BAR_H) : 0;
            const hB  = total ? Math.round(m.buy/total*BAR_H) : 0;
            const hH  = total ? Math.round(m.hold/total*BAR_H) : 0;
            const hS  = total ? Math.round(m.sell/total*BAR_H) : 0;
            const hSS = total ? Math.round(m.strongSell/total*BAR_H) : 0;
            const segments = [
              {h:hSS, c:'#ff4d6a', n:m.strongSell},
              {h:hS,  c:'#ff8c7a', n:m.sell},
              {h:hH,  c:'#ffdc50', n:m.hold},
              {h:hB,  c:'#7be5c0', n:m.buy},
              {h:hSB, c:'#00e5a0', n:m.strongBuy},
            ];
            return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px">
              <div style="font-family:var(--mono);font-size:13px;font-weight:500;color:var(--text)">${total}</div>
              <div style="width:100%;display:flex;flex-direction:column;gap:2px;border-radius:6px;overflow:hidden">
                ${segments.map(s => s.h > 0 ? `
                  <div style="width:100%;height:${Math.max(s.h,4)}px;background:${s.c};display:flex;align-items:center;justify-content:center">
                    ${s.h >= 14 ? `<span style="font-family:var(--mono);font-size:11px;color:rgba(0,0,0,0.6);font-weight:500">${s.n}</span>` : ''}
                  </div>` : '').join('')}
              </div>
              <div style="font-family:var(--mono);font-size:11px;color:var(--muted)">${m.period||''}</div>
            </div>`;
          }).join('')}
        </div>
        <div style="display:flex;gap:16px;margin-top:16px;flex-wrap:wrap">
          <span style="font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px"><span style="display:inline-block;width:10px;height:10px;background:#00e5a0;border-radius:2px"></span>Strong Buy</span>
          <span style="font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px"><span style="display:inline-block;width:10px;height:10px;background:#7be5c0;border-radius:2px"></span>Buy</span>
          <span style="font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px"><span style="display:inline-block;width:10px;height:10px;background:#ffdc50;border-radius:2px"></span>Hold</span>
          <span style="font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px"><span style="display:inline-block;width:10px;height:10px;background:#ff8c7a;border-radius:2px"></span>Underperform</span>
          <span style="font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px"><span style="display:inline-block;width:10px;height:10px;background:#ff4d6a;border-radius:2px"></span>Sell</span>
        </div>
      </div>` : '<div style="padding:24px;color:var(--muted);font-size:12px;font-family:var(--mono)">無推薦資料</div>';

    // ── 2. Price target visual ────────────────────────────────────
    const pt = price_target;
    let ptHtml = '<div style="padding:24px;color:var(--muted);font-size:12px;font-family:var(--mono)">無目標股價資料</div>';
    if (pt.mean && pt.high && pt.low && pt.current) {
      const lo = pt.low, hi = pt.high, cur = pt.current, avg = pt.mean;
      const range = hi - lo || 1;
      const curPct = Math.min(96, Math.max(4, (cur - lo) / range * 100));
      const avgPct = Math.min(96, Math.max(4, (avg - lo) / range * 100));
      const upside = ((avg - cur) / cur * 100).toFixed(1);
      const upsideUp = parseFloat(upside) >= 0;
      ptHtml = `
        <div style="padding:24px">
          <div style="font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);margin-bottom:20px">分析師目標股價（${pt.count||'—'} 位）</div>
          <div style="position:relative;margin:48px 0 32px">
            <!-- Track -->
            <div style="height:6px;background:var(--surface2);border-radius:3px;position:relative">
              <div style="position:absolute;left:0;right:0;top:0;bottom:0;background:linear-gradient(to right,#ff4d6a,#ffdc50,#00e5a0);border-radius:3px;opacity:0.25"></div>
              <!-- avg marker + label -->
              <div style="position:absolute;left:${avgPct}%;transform:translateX(-50%);top:-38px;text-align:center">
                <div style="background:rgba(123,97,255,0.15);border:1px solid var(--accent2);border-radius:6px;padding:4px 8px;font-family:var(--mono);font-size:13px;font-weight:500;color:var(--accent2);white-space:nowrap">$${avg.toFixed(2)}<br><span style="font-size:9px;letter-spacing:0.1em;opacity:0.7">AVERAGE</span></div>
                <div style="width:1px;height:10px;background:var(--accent2);margin:0 auto"></div>
              </div>
              <div style="position:absolute;left:${avgPct}%;transform:translateX(-50%);top:-3px;width:12px;height:12px;background:var(--accent2);border-radius:50%;border:2px solid var(--bg)"></div>
              <!-- current marker + label -->
              <div style="position:absolute;left:${curPct}%;transform:translateX(-50%);bottom:-32px;text-align:center">
                <div style="width:1px;height:10px;background:var(--text);margin:0 auto"></div>
                <div style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-family:var(--mono);font-size:13px;font-weight:500;color:var(--text);white-space:nowrap">$${cur.toFixed(2)}<br><span style="font-size:9px;letter-spacing:0.1em;opacity:0.7">CURRENT</span></div>
              </div>
              <div style="position:absolute;left:${curPct}%;transform:translateX(-50%);top:-3px;width:12px;height:12px;background:var(--text);border-radius:50%;border:2px solid var(--bg)"></div>
            </div>
          </div>
          <div style="display:flex;justify-content:space-between;margin-top:8px">
            <div style="font-family:var(--mono);font-size:12px"><div style="color:var(--red);font-size:15px;font-weight:500">$${lo.toFixed(2)}</div><div style="color:var(--muted);font-size:10px;margin-top:2px">LOW</div></div>
            <div style="font-family:var(--mono);font-size:12px;text-align:right"><div style="color:var(--accent);font-size:15px;font-weight:500">$${hi.toFixed(2)}</div><div style="color:var(--muted);font-size:10px;margin-top:2px">HIGH</div></div>
          </div>
          <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border);font-family:var(--mono);font-size:12px;display:flex;justify-content:space-between;align-items:center">
            <span style="color:var(--muted)">潛在漲幅</span>
            <span style="font-size:18px;font-weight:500;${upsideUp?'color:var(--accent)':'color:var(--red)'}">${upsideUp?'+':''}${upside}%</span>
          </div>
        </div>`;
    }

    // ── Side by side layout ───────────────────────────────────────
    const sideBySide = `
      <div style="display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border)">
        <div style="border-right:1px solid var(--border)">${recChartHtml}</div>
        <div>${ptHtml}</div>
      </div>`;

    // ── 3. Latest ratings table ───────────────────────────────────
    const ratingsHtml = latest_ratings.length ? `
      <div>
        <div style="padding:16px 24px 8px;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent)">最新評級記錄</div>
        <table class="upgrades-table">
          <thead><tr>
            <th>日期</th><th>機構</th><th>動作</th><th>前評級</th><th>新評級</th>
          </tr></thead>
          <tbody>
            ${latest_ratings.map(r => {
              const [cls, label] = actionStyle(r.action);
              return `<tr>
                <td style="color:var(--muted)">${r.date}</td>
                <td style="font-weight:500">${r.firm||'—'}</td>
                <td><span class="action-badge ${cls}">${label}</span></td>
                <td style="color:var(--muted);font-size:11px">${r.from_grade||'—'}</td>
                <td class="${gradeClass(r.to_grade)}">${r.to_grade||'—'}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>` : '<div style="padding:20px 24px;font-family:var(--mono);font-size:12px;color:var(--muted)">無評級記錄</div>';

    container.innerHTML = sideBySide + ratingsHtml;

  } catch(e) {
    container.innerHTML = `<div style="padding:20px 24px;color:var(--red)">載入失敗：${e.message}</div>`;
  }
}

async function doSearch() {
  const ticker = $('ticker-input').value.trim().toUpperCase();
  if (!ticker) return;

  const status = $('status');
  status.className = '';
  status.textContent = `正在抓取 ${ticker} 的資料，請稍候...`;
  $('dashboard').style.display = 'none';

  try {
    const res = await fetch(`/api/stock/${ticker}`);
    const data = await res.json();

    if (data.error) {
      status.className = 'error';
      status.textContent = `❌ ${data.error}`;
      return;
    }

    status.textContent = '';
    render(data);
  } catch(e) {
    status.className = 'error';
    status.textContent = '❌ 連線失敗，請確認後端是否執行中';
  }
}

function render(data) {
  const { basic, fundamentals, price_history, income_stmt, balance } = data;
  const up = basic.change_pct >= 0;
  const dash = $('dashboard');

  // ── Income table ────────────────────────────────────────────────
  let incomeHtml = '';
  if (income_stmt.length > 0) {
    const quarters = Object.keys(income_stmt[0]).filter(k => k !== 'label');
    incomeHtml = `
      <p class="section-title">損益表（近4季）</p>
      <div class="table-card"><table>
        <thead><tr>
          <th>指標</th>
          ${quarters.map(q => `<th>${q}</th>`).join('')}
        </tr></thead>
        <tbody>
          ${income_stmt.map(row => `
            <tr>
              <td>${row.label}</td>
              ${quarters.map(q => `<td>${fmtNum(row[q], '$')}</td>`).join('')}
            </tr>
          `).join('')}
        </tbody>
      </table></div>`;
  }

  // ── Balance table ─────────────────────────────────────────────
  let balanceHtml = '';
  if (Object.keys(balance).length > 0) {
    balanceHtml = `
      <p class="section-title">資產負債表（最新一季）</p>
      <div class="table-card"><table>
        <tbody>
          ${Object.entries(balance).map(([k,v]) => `
            <tr><td>${k}</td><td>${fmtNum(v,'$')}</td></tr>
          `).join('')}
        </tbody>
      </table></div>`;
  }

  dash.innerHTML = `
    <!-- Header -->
    <div class="stock-header">
      <div class="stock-name">
        <h2>${basic.name}</h2>
        <p>${basic.symbol} · ${basic.sector} · ${basic.industry}</p>
      </div>
      <div class="price-block">
        <div class="price-main">$${basic.price?.toFixed(2) ?? '—'}</div>
        <div class="price-change ${up?'up':'down'}">
          ${up?'▲':'▼'} $${Math.abs(basic.change).toFixed(2)} (${up?'+':''}${basic.change_pct.toFixed(2)}%)
        </div>
      </div>
    </div>

    <!-- Today stats -->
    <p class="section-title">今日行情</p>
    <div class="grid-4">
      <div class="card"><div class="card-label">開盤</div><div class="card-value">$${basic.open?.toFixed(2)??'—'}</div></div>
      <div class="card"><div class="card-label">最高</div><div class="card-value up">$${basic.day_high?.toFixed(2)??'—'}</div></div>
      <div class="card"><div class="card-label">最低</div><div class="card-value down">$${basic.day_low?.toFixed(2)??'—'}</div></div>
      <div class="card"><div class="card-label">成交量</div><div class="card-value">${fmtNum(basic.volume,'','',0)}</div><div class="card-sub">均量 ${fmtNum(basic.avg_volume,'','',0)}</div></div>
    </div>
    <div class="grid-2">
      <div class="card"><div class="card-label">52週最高</div><div class="card-value up">$${basic.week52_high?.toFixed(2)??'—'}</div></div>
      <div class="card"><div class="card-label">52週最低</div><div class="card-value down">$${basic.week52_low?.toFixed(2)??'—'}</div></div>
    </div>

    <!-- Chart -->
    <p class="section-title">近一年股價走勢</p>
    <div class="chart-card">
      <div class="chart-header">
        <span class="chart-title">${basic.symbol} · 日收盤價</span>
        <span class="chart-stat" id="chart-perf"></span>
      </div>
      <div class="chart-wrap"><canvas id="price-chart"></canvas></div>
    </div>

    <!-- Fundamentals -->
    <p class="section-title">基本面估值</p>
    <div class="grid-4">
      <div class="card"><div class="card-label">市值</div><div class="card-value">${fmtNum(fundamentals.market_cap,'$')}</div></div>
      <div class="card"><div class="card-label">本益比 P/E</div><div class="card-value">${fundamentals.pe_trailing?.toFixed(1)??'—'}</div><div class="card-sub">預估 ${fundamentals.pe_forward?.toFixed(1)??'—'}</div></div>
      <div class="card"><div class="card-label">EPS</div><div class="card-value">$${fundamentals.eps_trailing?.toFixed(2)??'—'}</div><div class="card-sub">預估 $${fundamentals.eps_forward?.toFixed(2)??'—'}</div></div>
      <div class="card"><div class="card-label">殖利率</div><div class="card-value">${fundamentals.dividend_yield!=null?fundamentals.dividend_yield+'%':'—'}</div></div>
    </div>
    <div class="grid-4">
      <div class="card"><div class="card-label">毛利率</div><div class="card-value">${fmtPct(fundamentals.gross_margin)}</div></div>
      <div class="card"><div class="card-label">淨利率</div><div class="card-value">${fmtPct(fundamentals.profit_margin)}</div></div>
      <div class="card"><div class="card-label">ROE</div><div class="card-value">${fmtPct(fundamentals.roe)}</div></div>
      <div class="card"><div class="card-label">Beta</div><div class="card-value">${fundamentals.beta?.toFixed(2)??'—'}</div></div>
    </div>
    <div class="grid-2">
      <div class="card"><div class="card-label">營收成長</div><div class="card-value">${fmtPct(fundamentals.revenue_growth)}</div></div>
      <div class="card"><div class="card-label">盈餘成長</div><div class="card-value">${fmtPct(fundamentals.earnings_growth)}</div></div>
    </div>

    <!-- Analyst -->
    <p class="section-title">法人評級</p>
    <div class="analyst-detail">
      <div class="analyst-summary">
        <div class="consensus-block">
          <div class="card-label">共識評級</div>
          <div class="rec-badge ${recClass(fundamentals.recommendation)}" style="margin-top:8px">${fundamentals.recommendation}</div>
        </div>
        <div class="consensus-block">
          <div class="card-label">分析師人數</div>
          <div style="font-family:var(--mono);font-size:22px;margin-top:8px">${fundamentals.analyst_count??'—'}</div>
        </div>
        <div class="consensus-block">
          <div class="card-label">目標價（平均）</div>
          <div style="font-family:var(--mono);font-size:22px;margin-top:8px">$${fundamentals.target_mean?.toFixed(2)??'—'}</div>
        </div>
        <div class="consensus-block">
          <div class="card-label">目標價（最高）</div>
          <div style="font-family:var(--mono);font-size:22px;margin-top:8px" class="up">$${fundamentals.target_high?.toFixed(2)??'—'}</div>
        </div>
        <div class="consensus-block">
          <div class="card-label">目標價（最低）</div>
          <div style="font-family:var(--mono);font-size:22px;margin-top:8px" class="down">$${fundamentals.target_low?.toFixed(2)??'—'}</div>
        </div>
      </div>
      <div style="padding:16px 24px;border-bottom:1px solid var(--border)">
        <button class="load-analysts-btn" onclick="loadAnalysts('${basic.symbol}')">▼ 載入機構升降評明細</button>
      </div>
      <div id="analysts-detail"></div>
    </div>

    <!-- Income & Balance -->
    ${incomeHtml}
    ${balanceHtml}

    <!-- Description -->
    ${basic.description ? `<p class="section-title">公司簡介</p><div class="desc-card">${basic.description}${basic.website?` <a href="${basic.website}" target="_blank" style="color:var(--accent);font-size:11px;margin-left:8px;">${basic.website}</a>`:''}</div>` : ''}
  `;

  dash.style.display = 'block';

  // ── Chart.js（等 DOM 渲染完再畫）──────────────────────────────
  setTimeout(() => {
  if (priceChart) { priceChart.destroy(); priceChart = null; }

  const canvas = document.getElementById('price-chart');
  if (!canvas) return;

  const labels = price_history.map(p => p.date);
  const closes = price_history.map(p => p.close);
  const first  = closes[0], last = closes[closes.length-1];
  const perf   = ((last-first)/first*100).toFixed(2);
  const perfUp = perf >= 0;
  $('chart-perf').innerHTML = `<span class="${perfUp?'up':'down'}">${perfUp?'▲':'▼'} ${Math.abs(perf)}% 近一年</span>`;

  const color = perfUp ? '#00e5a0' : '#ff4d6a';
  const ctx = canvas.getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 0, 280);
  grad.addColorStop(0, perfUp ? 'rgba(0,229,160,0.2)' : 'rgba(255,77,106,0.2)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');

  priceChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: closes,
        borderColor: color,
        borderWidth: 1.5,
        backgroundColor: grad,
        fill: true,
        pointRadius: 0,
        tension: 0.3,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a1a26',
          borderColor: 'rgba(255,255,255,0.1)',
          borderWidth: 1,
          titleColor: '#6b6b80',
          bodyColor: '#e8e8f0',
          bodyFont: { family: 'DM Mono', size: 13 },
          callbacks: {
            label: ctx => ` $${ctx.parsed.y.toFixed(2)}`
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: {
            color: '#6b6b80',
            font: { family: 'DM Mono', size: 10 },
            maxTicksLimit: 8,
          }
        },
        y: {
          position: 'right',
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: {
            color: '#6b6b80',
            font: { family: 'DM Mono', size: 10 },
            callback: v => '$' + v.toFixed(0)
          }
        }
      }
    }
  });
  }, 100);
}
</script>
</body>
</html>
